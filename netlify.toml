[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS für 1 Jahr (inkl. Subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Schutz vor MIME-Sniffing
    X-Content-Type-Options = "nosniff"
    # Schutz vor Clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Referrer nur an die eigene Domain senden
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Browser-APIs deaktivieren, die wir nicht brauchen
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    # XSS-Basisschutz (legacy, aber schadet nicht)
    X-XSS-Protection = "1; mode=block"

# Cache-Regeln fuer statische Assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/main.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================================
# WARTUNGSMODUS – Toggle
# ------------------------------------------------------------
# Zum AKTIVIEREN:  die fuehrenden "#" vor den 5 Zeilen weiter unten entfernen.
# Zum DEAKTIVIEREN: die "#" wieder davor setzen.
# Netlify wertet Redirects in Reihenfolge aus – die erste Uebereinstimmung gewinnt.
# Impressum, Datenschutz und die Wartungsseite selbst sind davor als Whitelist
# deklariert und bleiben daher auch im Wartungsmodus erreichbar (Pflichtangaben).
# Nach Commit in GitHub deployt Netlify automatisch in ~30 Sekunden.
# ============================================================

# --- Whitelist: diese Seiten sind auch im Wartungsmodus erreichbar ---
[[redirects]]
  from = "/impressum.html"
  to = "/impressum.html"
  status = 200

[[redirects]]
  from = "/datenschutz.html"
  to = "/datenschutz.html"
  status = 200

[[redirects]]
  from = "/wartung.html"
  to = "/wartung.html"
  status = 200

# --- Wartungs-Redirect (standardmaessig AUS) ---
#[[redirects]]
#  from = "/*"
#  to = "/wartung.html"
#  status = 302
#  force = true

# 404-Seite (muss am Ende stehen)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
