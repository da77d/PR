[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS für 1 Jahr (inkl. Subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Schutz vor MIME-Sniffing
    X-Content-Type-Options = "nosniff"
    # Schutz vor Clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Referrer nur an die eigene Domain senden
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Browser-APIs deaktivieren, die wir nicht brauchen
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    # XSS-Basisschutz (legacy, aber schadet nicht)
    X-XSS-Protection = "1; mode=block"

# Cache-Regeln fuer statische Assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/main.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# 404-Seite
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
